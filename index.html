<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font: 24px Helvetica;
        background: #fff;
    }
    .main{
        min-height: 500px;
        margin: 0px;
        padding: 0px;
        display: flex;
         flex-flow: row;   /*子元素按横轴方向顺序排列 */
    }
    .main>*{
        margin: 4px;
        padding: 5px;
        /* 1pt=px*3/4  */
        border-radius: 7pt;  
    }
    .main>article{
        background: #719DCA;
        /* 用数字也可以达到分配宽度的效果，将容器分为5份，占3份 */
        flex: 3;
        /* 排序为第2个子元素 */
        order: 2;
    }
    .main>nav{
        background: #FFBA41;
        /* 将容器分为5份，占1份  */
        flex: 1;
        order: 1;
    }
    .main>aside{
        background: #FFBA41;
        flex: 1;
        order: 3;
    }
    header,footer{
        display: block;
        margin: 4px;
        padding: 5px;
        min-height: 100px;
        border: 2px solid #FFBA41;
        border-radius: 7pt;
        background: #FFF;
    }
    @media all and (max-width:640px){
        .main{
            /* 弹性盒子中的子元素按纵轴的方向顺序排列 */
            flex-flow: column;
        }
        .main>article,
        .main>nav,
        .main>aside{
            /* 将子元素都设置成同一个值，表示按自然顺序排列 */
            order: 0;
        }
        .main>nav,
        .main>aside,
        header,footer{
            min-height: 50px;
            max-height: 50px;
        }
    }
</style>
<body>
    <header>header</header>
    <div class="main">
        <article>article</article>
        <nav>nav</nav>
        <aside>aside</aside>
    </div>
    <footer>footer</footer>
</body>
</html>
